<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Review — SmartTransit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        .star-rating {
            direction: rtl;
            display: inline-block;
            font-size: 2rem;
            cursor: pointer;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            color: var(--text-muted);
            transition: 0.2s;
        }

        .star-rating label:hover,
        .star-rating label:hover~label,
        .star-rating input:checked~label {
            color: #fbc02d;
        }
    </style>
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">🏠</span> Home</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚌</span> Find Bus</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminal DB</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing DB</a>
            <a href="reviews.html" class="menu-item active"><span class="icon">⭐</span> Reviews</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Submit Feedback</h2>

            <ul class="nav nav-pills mb-4 st-tabs" id="reviewTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="bus-tab" data-bs-toggle="tab" data-bs-target="#bus"
                        type="button" role="tab" aria-selected="true">🚌 Rate a Bus</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="app-tab" data-bs-toggle="tab" data-bs-target="#app" type="button"
                        role="tab" aria-selected="false">📱 Rate the App</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Bus Review Tab -->
                <div class="tab-pane fade show active" id="bus" role="tabpanel" tabindex="0">
                    <div class="row">
                        <div class="col-lg-6">
                            <form class="st-card" onsubmit="submitBusReview(event)">
                                <h5 class="fw-bold mb-4">Rate your bus journey</h5>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Select Bus</label>
                                    <select class="form-select" id="busSelect" required>
                                        <option value="">Loading buses…</option>
                                    </select>
                                </div>

                                <div class="mb-3 text-center p-3 bg-dark rounded border border-secondary">
                                    <label class="form-label d-block fw-semibold text-light mb-1">Your Rating</label>
                                    <div class="star-rating">
                                        <input type="radio" id="b5" name="busRating" value="5" required /><label
                                            for="b5">★</label>
                                        <input type="radio" id="b4" name="busRating" value="4" /><label
                                            for="b4">★</label>
                                        <input type="radio" id="b3" name="busRating" value="3" /><label
                                            for="b3">★</label>
                                        <input type="radio" id="b2" name="busRating" value="2" /><label
                                            for="b2">★</label>
                                        <input type="radio" id="b1" name="busRating" value="1" /><label
                                            for="b1">★</label>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Comments</label>
                                    <textarea class="form-control" id="busComments" rows="3"
                                        placeholder="Tell us about your experience..." required></textarea>
                                </div>

                                <button type="submit" class="btn-st w-100" id="btnBusSubmit">Submit Bus Review</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- App Review Tab -->
                <div class="tab-pane fade" id="app" role="tabpanel" tabindex="0">
                    <div class="row">
                        <div class="col-lg-6">
                            <form class="st-card" onsubmit="submitAppReview(event)">
                                <h5 class="fw-bold mb-4">Rate the SmartTransit App</h5>

                                <div class="mb-3 text-center p-3 bg-dark rounded border border-secondary">
                                    <label class="form-label d-block fw-semibold text-light mb-1">Your Rating</label>
                                    <div class="star-rating">
                                        <input type="radio" id="a5" name="appRating" value="5" required /><label
                                            for="a5">★</label>
                                        <input type="radio" id="a4" name="appRating" value="4" /><label
                                            for="a4">★</label>
                                        <input type="radio" id="a3" name="appRating" value="3" /><label
                                            for="a3">★</label>
                                        <input type="radio" id="a2" name="appRating" value="2" /><label
                                            for="a2">★</label>
                                        <input type="radio" id="a1" name="appRating" value="1" /><label
                                            for="a1">★</label>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">App Feedback</label>
                                    <textarea class="form-control" id="appComments" rows="3"
                                        placeholder="How can we improve the app?" required></textarea>
                                </div>

                                <button type="submit" class="btn-st-outline w-100" id="btnAppSubmit">Submit App
                                    Review</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("user");

        async function loadBuses() {
            try {
                const buses = await api.get("/user/buses/nearest");
                const select = document.getElementById("busSelect");
                if (!buses.length) {
                    select.innerHTML = '<option value="">No buses available to rate.</option>';
                    return;
                }
                select.innerHTML = '<option value="">— Select a Bus —</option>';
                buses.forEach(b => {
                    const opt = document.createElement("option");
                    opt.value = b.bus_id;
                    opt.textContent = `Bus #${b.bus_number}`;
                    select.appendChild(opt);
                });
            } catch (err) {
                document.getElementById("busSelect").innerHTML = '<option value="">Failed to load buses.</option>';
            }
        }

        async function submitBusReview(e) {
            e.preventDefault();
            const busId = document.getElementById('busSelect').value;
            const ratingEl = document.querySelector('input[name="busRating"]:checked');
            const comments = document.getElementById('busComments').value;
            const btn = document.getElementById('btnBusSubmit');

            if (!busId) return showToast("Please select a bus.", "error");
            if (!ratingEl) return showToast("Please select a star rating.", "error");

            btn.disabled = true;
            btn.innerHTML = "Submitting...";
            try {
                await api.post("/user/reviews", {
                    bus_id: parseInt(busId),
                    rating: parseInt(ratingEl.value),
                    comments: comments
                });
                showToast("Bus review submitted successfully!", "success");
                e.target.reset(); // Clear form
            } catch (err) {
                console.error(err);
                showToast("Failed to submit review.", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Submit Bus Review";
            }
        }

        async function submitAppReview(e) {
            e.preventDefault();
            const ratingEl = document.querySelector('input[name="appRating"]:checked');
            const comments = document.getElementById('appComments').value;
            const btn = document.getElementById('btnAppSubmit');

            if (!ratingEl) return showToast("Please select a star rating.", "error");

            btn.disabled = true;
            btn.innerHTML = "Submitting...";
            try {
                await api.post("/user/app-reviews", {
                    rating: parseInt(ratingEl.value),
                    comments: comments
                });
                showToast("App feedback submitted successfully!", "success");
                e.target.reset(); // Clear form
            } catch (err) {
                console.error(err);
                showToast("Failed to submit app feedback.", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Submit App Review";
            }
        }

        loadBuses();
    </script>
</body>

</html>
