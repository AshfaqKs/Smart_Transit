<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerts — SmartTransit Passenger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">🏠</span> Home</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚌</span> Find Bus</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item active"><span class="icon">🔔</span> Alerts</a>
            <a href="camera.html" class="menu-item"><span class="icon">📷</span> Camera AI</a>
            <a href="face_scan.html" class="menu-item"><span class="icon">🔍</span> Face Scan</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminal DB</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing DB</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Safety Alerts</h2>
            <p class="text-muted mb-4">Alerts are generated by AI cameras on buses detecting criminals or missing
                persons.</p>
            <div id="alertList">
                <div class="text-muted">Loading…</div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("user");
        async function load() {
            const alerts = await api.get("/user/alerts");
            const el = document.getElementById("alertList");
            if (!alerts.length) { el.innerHTML = '<div class="st-card text-muted">No alerts at this time. ✅</div>'; return; }
            el.innerHTML = alerts.map(a => `
      <div class="st-card mb-3" style="border-left:4px solid var(--danger);">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-bold text-danger">🚨 ${esc(a.detected_person_type === "criminal" ? "Criminal Detected" : "Missing Person Detected")}: ${esc(a.person_name || 'Unknown')}</div>
            <div class="text-muted mt-1" style="font-size:.85rem;">
              Bus: ${esc(a.bus_number)} (${esc(a.bus_registration)}) | 📍 ${esc(a.location_name)}
            </div>
            <div class="text-muted" style="font-size:.8rem;">${esc(a.detection_time)}</div>
          </div>
          ${badge(a.alert_status)}
        </div>
      </div>`).join("");
        }
        load();
        setInterval(load, 15000);
    </script>
</body>

</html>
