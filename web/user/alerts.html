<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerts — SmartTransit Passenger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">🏠</span> Home</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚌</span> Find Bus</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item active"><span class="icon">🔔</span> Alerts</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminal DB</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing DB</a>
            <a href="camera.html" class="menu-item"><span class="icon">📷</span> Camera AI</a>
            <a href="face_scan.html" class="menu-item"><span class="icon">🔍</span> Face Scan</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-2">Safety Alerts</h2>
            <p class="text-muted mb-4">Alerts generated by AI cameras on buses detecting criminals or missing persons.</p>
            <div id="alertList">
                <div class="text-muted">Loading…</div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("user");

        function fmtDate(iso) {
            if (!iso) return "—";
            try { return new Date(iso).toLocaleString('en-IN'); } catch { return iso; }
        }

        async function load() {
            const alerts = await api.get("/user/alerts");
            const el = document.getElementById("alertList");
            if (!alerts.length) {
                el.innerHTML = '<div class="st-card text-muted">No alerts at this time. ✅</div>';
                return;
            }
            el.innerHTML = alerts.map(a => `
              <div class="st-card mb-3" style="border-left:4px solid var(--danger);">
                <div class="d-flex justify-content-between align-items-start">
                  <div class="flex-grow-1">
                    <div class="fw-bold text-danger fs-5 mb-1">
                      🚨 ${esc(a.detected_person_type === "criminal" ? "Criminal Detected" : "Missing Person Detected")}
                    </div>
                    <div class="row g-2 mt-1">
                      <div class="col-md-4">
                        <div class="text-muted" style="font-size:.78rem;">PERSON</div>
                        <div class="fw-semibold">${esc(a.person_name) || "Reference #" + esc(a.reference_id)}</div>
                      </div>
                      <div class="col-md-4">
                        <div class="text-muted" style="font-size:.78rem;">BUS REG. NO.</div>
                        <div class="font-monospace">${esc(a.bus_registration) || (a.bus_id ? "Bus #" + esc(a.bus_id) : "—")}</div>
                      </div>
                      <div class="col-md-4">
                        <div class="text-muted" style="font-size:.78rem;">DETECTION TIME</div>
                        <div>${fmtDate(a.detection_time)}</div>
                      </div>
                      <div class="col-12">
                        <div class="text-muted" style="font-size:.78rem;">BUS LOCATION AT DETECTION</div>
                        <div>📍 ${esc(a.location) || "—"}</div>
                      </div>
                    </div>
                  </div>
                  <div class="ms-3">${badge(a.alert_status)}</div>
                </div>
              </div>`).join("");
        }

        load();
        setInterval(load, 15000);
    </script>
</body>
</html>
