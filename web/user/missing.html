<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Missing Persons Database — SmartTransit Passenger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">🏠</span> Home</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚌</span> Find Bus</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminal DB</a>
            <a href="missing.html" class="menu-item active"><span class="icon">🔍</span> Missing DB</a>
            <a href="reviews.html" class="menu-item"><span class="icon">⭐</span> Reviews</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">View Missing Persons</h2>
            <p class="text-muted mb-4">Active missing person reports. If you spot them on a bus, please notify
                authorities immediately or rely on the Camera AI alerts.</p>
            <div class="st-card">
                <div id="missingList">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("user");
        async function load() {
            const items = await api.get("/user/missing");
            const el = document.getElementById("missingList");
            if (!items.length) { el.innerHTML = '<p class="text-muted">No records found.</p>'; return; }
            el.innerHTML = items.map(m => `
      <div class="d-flex align-items-center mb-3 pb-3 border-bottom border-secondary">
        <img src="${m.photo ? '/uploads/' + m.photo : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(m.name || 'Missing') + '&background=random'}" 
             alt="Photo" style="width:60px; height:60px; object-fit:cover; border-radius:8px; margin-right:15px; border:1px solid var(--secondary);">
        <div>
          <div class="fw-bold fs-5 text-primary">${esc(m.name)}</div>
          <div class="text-light fw-semibold mt-1" style="opacity: 0.9;">Age: ${m.age}</div>
          <div class="text-light mt-1" style="font-size:0.9rem; opacity: 0.9;">${esc(m.description)}</div>
        </div>
      </div>`).join("");
        }
        load();
    </script>
</body>

</html>
