<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Scan — SmartTransit Passenger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        /* Webcam feed */
        #webcamVideo {
            width: 100%;
            max-height: 340px;
            object-fit: cover;
            border-radius: var(--radius);
            border: 2px solid var(--dark-border);
            background: #000;
        }

        #captureCanvas {
            display: none;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .4; transform: scale(1.3); }
        }

        #scanResult {
            min-height: 180px;
            border-radius: var(--radius);
            border: 1px solid var(--dark-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            transition: all .3s;
        }

        #scanResult.match {
            border-color: var(--danger);
            background: rgba(239, 68, 68, .07);
        }

        #scanResult.clear {
            border-color: var(--success);
            background: rgba(16, 185, 129, .07);
        }
    </style>
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">🏠</span> Home</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚌</span> Find Bus</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
            <a href="camera.html" class="menu-item"><span class="icon">📷</span> Camera AI</a>
            <a href="face_scan.html" class="menu-item active"><span class="icon">🔍</span> Face Scan</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminal DB</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing DB</a>
        </aside>

        <main class="st-content">
            <h2 class="fw-bold mb-4">🔍 Face Scan</h2>

            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="st-card">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h5 class="fw-bold mb-0">Live Camera Feed</h5>
                            <span id="liveIndicator" class="text-muted small">Camera off</span>
                        </div>

                        <video id="webcamVideo" autoplay playsinline muted></video>
                        <canvas id="captureCanvas"></canvas>

                        <div class="d-flex mt-3 gap-2">
                            <button class="btn-st flex-fill" id="startCamBtn" onclick="startWebcam()">
                                📷 Start Webcam
                            </button>
                            <button class="btn-st flex-fill" id="stopCamBtn" onclick="stopWebcam()" style="display:none; background: #ef4444;">
                                ⏹ Stop
                            </button>
                        </div>

                        <div class="mt-3">
                            <label class="fw-semibold small mb-1 d-block">Select Bus <span class="text-danger">*</span></label>
                            <select class="form-select mb-3" id="scanBusSelect" required>
                                <option value="">-- Choose Bus --</option>
                            </select>
                            <button class="btn-st w-100 py-2" id="scanBtn" onclick="captureAndScan()" disabled>
                                🔍 Capture &amp; Scan
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="st-card h-100 d-flex flex-column">
                        <h5 class="fw-bold mb-3">Scan Result</h5>
                        <div id="scanResult" class="flex-fill">
                            <span style="font-size:3rem;">🔍</span>
                            <p class="text-muted mt-3 mb-0">Start the webcam and capture a frame to run AI detection.</p>
                        </div>
                        <div id="capturedPreviewWrap" class="mt-3" style="display:none;">
                            <p class="small text-muted mb-1">Captured frame:</p>
                            <img id="capturedPreview" src="" alt="Captured" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;border:1px solid var(--dark-border);" />
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("user");
        let stream = null;

        async function loadBuses() {
            try {
                const buses = await api.get("/user/buses/nearest");
                const sel = document.getElementById("scanBusSelect");
                buses.forEach(b => {
                    const opt = document.createElement("option");
                    opt.value = b.bus_id;
                    opt.textContent = `Bus #${b.bus_number} (${b.registration_number})`;
                    sel.appendChild(opt);
                });
            } catch (_) { }
        }

        async function startWebcam() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById("webcamVideo");
                video.srcObject = stream;
                document.getElementById("startCamBtn").style.display = "none";
                document.getElementById("stopCamBtn").style.display = "inline-flex";
                document.getElementById("scanBtn").disabled = false;
                document.getElementById("liveIndicator").innerHTML = '<span class="live-dot"></span><span class="text-danger fw-semibold">LIVE</span>';
            } catch (err) {
                showToast("Camera access denied", "error");
            }
        }

        function stopWebcam() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            const video = document.getElementById("webcamVideo");
            video.srcObject = null;
            document.getElementById("startCamBtn").style.display = "inline-flex";
            document.getElementById("stopCamBtn").style.display = "none";
            document.getElementById("scanBtn").disabled = true;
            document.getElementById("liveIndicator").textContent = "Camera off";
            document.getElementById("capturedPreviewWrap").style.display = "none";
        }

        async function captureAndScan() {
            if (!stream) return;
            const busId = document.getElementById("scanBusSelect").value;
            if (!busId) { showToast("Please select a bus", "error"); return; }

            const video = document.getElementById("webcamVideo");
            const canvas = document.getElementById("captureCanvas");
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext("2d").drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
            document.getElementById("capturedPreview").src = dataUrl;
            document.getElementById("capturedPreviewWrap").style.display = "block";

            const result = document.getElementById("scanResult");
            result.className = "";
            result.innerHTML = '<div class="spinner-border text-primary mb-3"></div><p class="text-muted">Analyzing...</p>';

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("image", blob, "webcam_capture.jpg");
                formData.append("bus_id", busId);

                try {
                    const res = await api.upload("/camera/detect", formData);
                    if (res.matched) {
                        result.className = "match";
                        result.innerHTML = `<span style="font-size:3rem">🚨</span><h4 class="text-danger fw-bold mt-2">MATCH DETECTED!</h4><p class="text-warning text-capitalize">${esc(res.person_type)} Match #${esc(res.reference_id)}</p>`;
                        showToast("Alert generated!", "error");
                    } else {
                        result.className = "clear";
                        result.innerHTML = `<span style="font-size:3rem">✅</span><h4 class="text-success fw-bold mt-2">No Match</h4><p class="text-muted">Person not in database.</p>`;
                        showToast("Scan complete.", "success");
                    }
                } catch (err) {
                    result.innerHTML = `<span style="font-size:2.5rem">❌</span><p class="text-muted mt-2">Error</p>`;
                }
            }, "image/jpeg", 0.9);
        }

        loadBuses();
    </script>
</body>

</html>
