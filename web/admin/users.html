<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users — SmartTransit Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="routes.html" class="menu-item"><span class="icon">🗺️</span> Routes</a>
            <a href="drivers.html" class="menu-item"><span class="icon">🚌</span> Drivers</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚍</span> Buses</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="camera.html" class="menu-item"><span class="icon">📷</span> Camera AI</a>
            <a href="face_scan.html" class="menu-item"><span class="icon">🔍</span> Face Scan</a>
            <a href="users.html" class="menu-item active"><span class="icon">👥</span> Users</a>
            <a href="police.html" class="menu-item"><span class="icon">👮</span> Police</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Passenger Directory</h2>
            <div class="st-card">
                <div id="usersList">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("admin");
        async function load() {
            const items = await api.get("/admin/users");
            const el = document.getElementById("usersList");
            if (!items.length) { el.innerHTML = '<p class="text-muted">No users found.</p>'; return; }
            el.innerHTML = `<table class="st-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Registration Date</th></tr></thead>
            <tbody>${items.map(u => `<tr>
                <td>${esc(u.user_id)}</td>
                <td class="fw-bold">${esc(u.name)}</td>
                <td>${esc(u.email)}</td>
                <td>${esc(u.phone_number)}</td>
                <td>${esc(u.created_at)}</td>
            </tr>`).join("")}</tbody></table>`;
        }
        load();
    </script>
</body>

</html>
