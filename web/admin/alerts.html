<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Alerts — SmartTransit Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="routes.html" class="menu-item"><span class="icon">🗺️</span> Routes</a>
            <a href="drivers.html" class="menu-item"><span class="icon">🚌</span> Drivers</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚍</span> Buses</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item active"><span class="icon">🔔</span> Alerts</a>
            <a href="users.html" class="menu-item"><span class="icon">👥</span> Users</a>
            <a href="police.html" class="menu-item"><span class="icon">👮</span> Police</a>
        </aside>
        <main class="st-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">System Security Alerts</h2>
                    <p class="text-muted small mb-0">Manage and resolve AI-detected safety incidents from all buses.</p>
                </div>
            </div>

            <div class="st-card p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0" style="--bs-table-bg: transparent;">
                        <thead>
                            <tr class="text-muted small">
                                <th class="ps-4"># SERIAL</th>
                                <th>TYPE</th>
                                <th>PERSON</th>
                                <th>BUS REG. NO.</th>
                                <th>LOCATION</th>
                                <th>TIME</th>
                                <th>STATUS</th>
                                <th class="text-end pe-4">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="alertBody">
                            <tr><td colspan="8" class="text-center text-muted py-5">Loading alerts…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("admin");

        function fmtDate(iso) {
            if (!iso) return "—";
            try { return new Date(iso).toLocaleString('en-IN'); } catch { return iso; }
        }

        async function load() {
            try {
                const alerts = await api.get("/admin/detections");
                const tbody = document.getElementById("alertBody");
                if (!alerts.length) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">No security alerts logged yet. ✅</td></tr>';
                    return;
                }
                tbody.innerHTML = alerts.map((a, i) => `
                    <tr>
                        <td class="ps-4 text-muted">#${i + 1}</td>
                        <td><span class="fw-semibold" style="color:var(--danger)">${esc(a.detected_person_type.replace('_',' '))}</span></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                ${a.person_photo ? `<img src="${API_BASE_URL}/uploads/${esc(a.person_photo)}" style="width:28px;height:28px;object-fit:cover;border-radius:4px;" />` : ''}
                                <span class="fw-semibold">${esc(a.person_name)}</span>
                            </div>
                        </td>
                        <td><span class="font-monospace">${esc(a.bus_registration) || esc(a.bus_id) || "—"}</span></td>
                        <td><small>${esc(a.location) || "—"}</small></td>
                        <td><small>${fmtDate(a.detection_time)}</small></td>
                        <td>${badge(a.alert_status)}</td>
                        <td class="text-end pe-4">
                            ${a.alert_status === 'unresolved' ? 
                                `<button class="btn-st-outline btn-sm" onclick="resolve('${a.detection_id}')">Resolve</button>` : 
                                '<span class="text-success small">Done</span>'}
                        </td>
                    </tr>
                `).join("");
            } catch (err) {
                console.error(err);
                document.getElementById("alertBody").innerHTML = '<tr><td colspan="8" class="text-center text-danger py-5">Failed to load alerts.</td></tr>';
            }
        }

        async function resolve(id) {
            try {
                await api.put(`/admin/detections/${id}/resolve`, {});
                showToast("Alert resolved successfully.", "success");
                load();
            } catch (err) {
                showToast("Failed to resolve alert.", "error");
            }
        }

        load();
        setInterval(load, 30000); // Poll every 30s
    </script>
</body>
</html>
