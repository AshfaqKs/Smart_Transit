<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Police Stations — SmartTransit Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="routes.html" class="menu-item"><span class="icon">🗺️</span> Routes</a>
            <a href="drivers.html" class="menu-item"><span class="icon">🚌</span> Drivers</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚍</span> Buses</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="camera.html" class="menu-item"><span class="icon">📷</span> Camera AI</a>
            <a href="face_scan.html" class="menu-item"><span class="icon">🔍</span> Face Scan</a>
            <a href="users.html" class="menu-item"><span class="icon">👥</span> Users</a>
            <a href="police.html" class="menu-item active"><span class="icon">👮</span> Police</a>
        </aside>
        <main class="st-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Police Stations</h2>
                <button class="btn-st" data-bs-toggle="modal" data-bs-target="#policeModal">+ Add Station</button>
            </div>
            <div class="st-card">
                <div id="policeList">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="policeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Police Station</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body st-form">
                    <div class="mb-3"><label>Station Name</label><input type="text" class="form-control" id="pName" />
                    </div>
                    <div class="mb-3"><label>Location</label><input type="text" class="form-control" id="pLoc" /></div>
                    <div class="mb-3"><label>Contact</label><input type="text" class="form-control" id="pContact" />
                    </div>
                    <div class="mb-3"><label>Email</label><input type="email" class="form-control" id="pEmail" /></div>
                    <div class="mb-3"><label>Initial Password</label><input type="password" class="form-control"
                            id="pPass" /></div>
                </div>
                <div class="modal-footer"><button class="btn-st" onclick="addPolice()">Save</button></div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("admin");
        async function load() {
            const items = await api.get("/admin/police");
            const el = document.getElementById("policeList");
            if (!items.length) { el.innerHTML = '<p class="text-muted">No police stations found.</p>'; return; }
            el.innerHTML = `<table class="st-table"><thead><tr><th>ID</th><th>Name</th><th>Location</th><th>Contact</th><th>Email</th></tr></thead>
            <tbody>${items.map(p => `<tr>
                <td>${esc(p.police_id)}</td>
                <td class="fw-bold">${esc(p.station_name)}</td>
                <td>${esc(p.location)}</td>
                <td>${esc(p.contact_number)}</td>
                <td>${esc(p.email)}</td>
            </tr>`).join("")}</tbody></table>`;
        }
        async function addPolice() {
            await api.post("/admin/police", {
                station_name: document.getElementById("pName").value,
                location: document.getElementById("pLoc").value,
                contact_number: document.getElementById("pContact").value,
                email: document.getElementById("pEmail").value,
                password: document.getElementById("pPass").value || "123456"
            });
            bootstrap.Modal.getInstance(document.getElementById("policeModal")).hide();
            showToast("Station added successfully!", "success");
            load();
        }
        load();
    </script>
</body>

</html>
