<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — SmartTransit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-muted">Admin Panel</span>
            <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="st-layout">
        <!-- Sidebar -->
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item active"><span class="icon">📊</span> Dashboard</a>
            <a href="routes.html" class="menu-item"><span class="icon">🗺️</span> Routes</a>
            <a href="drivers.html" class="menu-item"><span class="icon">🚌</span> Drivers</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚍</span> Buses</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
            <a href="users.html" class="menu-item"><span class="icon">👥</span> Users</a>
            <a href="police.html" class="menu-item"><span class="icon">👮</span> Police</a>
        </aside>
        <!-- Content -->
        <main class="st-content">
            <h2 class="fw-bold mb-4">System Overview</h2>
            <div class="row g-4 mb-5" id="statsRow">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon">👤</div>
                        <div class="stat-value" id="statUsers">—</div>
                        <div class="stat-label">Users</div>
                    </div>
                </div>
                <!-- Alerts stat -->
                <div class="col-md-3">
                    <div class="stat-card" style="border-bottom: 3px solid var(--danger);">
                        <div class="stat-icon">🚨</div>
                        <div class="stat-value" id="statAlerts">—</div>
                        <div class="stat-label">Security Alerts</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon">🚍</div>
                        <div class="stat-value" id="statBuses">—</div>
                        <div class="stat-label">Buses</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-value" id="statComplaints">—</div>
                        <div class="stat-label">Complaints</div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3 d-flex justify-content-between align-items-center">
                            Recent Complaints
                            <a href="complaints.html" class="btn-st-outline btn-sm" style="font-size:.75rem">View All</a>
                        </h5>
                        <div id="recentComplaints">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3 d-flex justify-content-between align-items-center">
                            Recent Security Alerts
                            <a href="alerts.html" class="btn-st-outline btn-sm" style="font-size:.75rem">View All</a>
                        </h5>
                        <div id="recentAlerts">
                            <div class="text-muted small">Loading…</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 mt-4">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3">Pending Driver Approvals</h5>
                        <div id="pendingDrivers">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("admin");
        async function load() {
            try {
                const [users, drivers, buses, complaints, alerts] = await Promise.all([
                    api.get("/admin/users"), api.get("/admin/drivers"),
                    api.get("/admin/buses"), api.get("/admin/complaints"),
                    api.get("/admin/detections")
                ]);
                document.getElementById("statUsers").textContent = users.length;
                document.getElementById("statAlerts").textContent = alerts.length;
                document.getElementById("statBuses").textContent = buses.length;
                document.getElementById("statComplaints").textContent = complaints.length;

                // Recent complaints
                const cEl = document.getElementById("recentComplaints");
                if (!complaints.length) { cEl.innerHTML = '<p class="text-muted">No complaints yet.</p>'; }
                else {
                    cEl.innerHTML = complaints.slice(0, 5).map((c, i) => `
                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom border-secondary">
                          <div>
                            <small class="text-muted">#${i+1} · ${esc(c.passenger_name || 'Passenger')}</small><br>
                            ${esc(c.complaint_type)}
                          </div>
                          <div class="text-end">
                            <small class="text-muted d-block">${c.created_at ? new Date(c.created_at).toLocaleString('en-IN', {hour:'2-digit', minute:'2-digit'}) : "—"}</small>
                            ${badge(c.status)}
                          </div>
                        </div>`).join("");
                }

                // Recent alerts
                const aEl = document.getElementById("recentAlerts");
                if (!alerts.length) { aEl.innerHTML = '<p class="text-muted">No security alerts.</p>'; }
                else {
                    aEl.innerHTML = alerts.slice(0, 5).map((a, i) => `
                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom border-secondary">
                          <div>
                            <small class="text-danger fw-bold">${esc(a.detected_person_type.toUpperCase())}</small> · ${esc(a.person_name)}<br>
                            <small class="text-muted">📍 ${esc(a.location || 'Unknown location')}</small>
                          </div>
                          <div class="text-end">
                            <small class="text-muted d-block">${a.detection_time ? new Date(a.detection_time).toLocaleString('en-IN', {hour:'2-digit', minute:'2-digit'}) : "—"}</small>
                            ${badge(a.alert_status)}
                          </div>
                        </div>`).join("");
                }

                // Pending drivers
                const dEl = document.getElementById("pendingDrivers");
                const pending = drivers.filter(d => !d.approval_status);
                if (!pending.length) { dEl.innerHTML = '<p class="text-muted">No pending approvals.</p>'; }
                else {
                    dEl.innerHTML = pending.slice(0, 8).map(d => `
                        <div class="d-flex justify-content-between align-items-center py-2 border-bottom border-secondary">
                          <div>${esc(d.name)}<br><small class="text-muted">${esc(d.email)}</small></div>
                          <a href="drivers.html" class="btn-st-outline btn-sm">Review</a>
                        </div>`).join("");
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to load dashboard data.", "error");
            }
        }
        load();
    </script>
</body>

</html>
