<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Routes — SmartTransit Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="routes.html" class="menu-item active"><span class="icon">🗺️</span> Routes</a>
            <a href="drivers.html" class="menu-item"><span class="icon">🚌</span> Drivers</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚍</span> Buses</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
            <a href="users.html" class="menu-item"><span class="icon">👥</span> Users</a>
            <a href="police.html" class="menu-item"><span class="icon">👮</span> Police</a>
        </aside>
        <main class="st-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Bus Routes</h2>
                <button class="btn-st" data-bs-toggle="modal" data-bs-target="#routeModal" onclick="openAdd()">+ Add
                    Route</button>
            </div>

            <div class="st-card">
                <div id="routeTable">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Route Modal -->
    <div class="modal fade" id="routeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="routeModalTitle">Add Route</h5><button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body st-form">
                    <input type="hidden" id="routeId" />
                    <div class="mb-3"><label>Route Name</label><input type="text" class="form-control" id="routeName" />
                    </div>
                    <div class="mb-3"><label>Start Point</label><input type="text" class="form-control"
                            id="startPoint" /></div>
                    <div class="mb-3"><label>End Point</label><input type="text" class="form-control" id="endPoint" />
                    </div>
                </div>
                <div class="modal-footer"><button class="btn-st" onclick="saveRoute()">Save</button></div>
            </div>
        </div>
    </div>

    <!-- Stops Modal -->
    <div class="modal fade" id="stopsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Manage Stops: <span id="stopsRouteName" class="text-primary"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="stopsRouteId" />

                    <div class="d-flex gap-2 mb-4">
                        <input type="text" id="newStopName" class="form-control" placeholder="Enter new stop name...">
                        <button class="btn btn-primary px-4" onclick="addStop()">Add Stop</button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-sm align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th width="80">Order</th>
                                    <th>Stop Name</th>
                                    <th width="80">Action</th>
                                </tr>
                            </thead>
                            <tbody id="stopsTbody">
                                <tr>
                                    <td colspan="3" class="text-center text-muted">Loading stops...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("admin");
        let routes = [];

        async function loadRoutes() {
            routes = await api.get("/admin/routes");
            const el = document.getElementById("routeTable");
            if (!routes.length) { el.innerHTML = '<p class="text-muted">No routes yet.</p>'; return; }
            el.innerHTML = `<table class="st-table"><thead><tr><th>#</th><th>Route Name</th><th>Start</th><th>End</th><th>Stops</th><th>Actions</th></tr></thead>
      <tbody>${routes.map(r => `<tr>
        <td>${esc(r.route_id)}</td><td>${esc(r.route_name)}</td>
        <td>${esc(r.start_point)}</td><td>${esc(r.end_point)}</td>
        <td><span class="badge bg-secondary">${r.stops ? r.stops.length : 0} stops</span></td>
        <td>
          <button class="btn btn-sm btn-info me-1 text-white" onclick="openStops(${r.route_id})">Stops</button>
          <button class="btn btn-sm btn-warning me-1" onclick="openEdit(${r.route_id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRoute(${r.route_id})">Delete</button>
        </td></tr>`).join("")}
      </tbody></table>`;
        }

        function openAdd() {
            document.getElementById("routeModalTitle").textContent = "Add Route";
            ["routeId", "routeName", "startPoint", "endPoint"].forEach(id => document.getElementById(id).value = "");
        }

        function openEdit(id) {
            const r = routes.find(x => x.route_id === id);
            document.getElementById("routeModalTitle").textContent = "Edit Route";
            document.getElementById("routeId").value = r.route_id;
            document.getElementById("routeName").value = r.route_name;
            document.getElementById("startPoint").value = r.start_point;
            document.getElementById("endPoint").value = r.end_point;
            new bootstrap.Modal(document.getElementById("routeModal")).show();
        }

        async function saveRoute() {
            const id = document.getElementById("routeId").value;
            const body = {
                route_name: document.getElementById("routeName").value,
                start_point: document.getElementById("startPoint").value,
                end_point: document.getElementById("endPoint").value,
            };
            if (id) await api.put(`/admin/routes/${id}`, body);
            else await api.post("/admin/routes", body);
            bootstrap.Modal.getInstance(document.getElementById("routeModal")).hide();
            showToast("Route saved!", "success");
            loadRoutes();
        }

        async function deleteRoute(id) {
            if (!confirm("Delete this route?")) return;
            await api.delete(`/admin/routes/${id}`);
            showToast("Route deleted", "success");
            loadRoutes();
        }

        // --- Stops Management ---
        let currentStops = [];
        let activeRouteId = null;

        async function openStops(routeId) {
            activeRouteId = routeId;
            const route = routes.find(r => r.route_id === routeId);
            document.getElementById("stopsRouteName").textContent = route.route_name;
            document.getElementById("stopsRouteId").value = routeId;
            document.getElementById("newStopName").value = "";
            new bootstrap.Modal(document.getElementById("stopsModal")).show();
            await loadStops();
        }

        async function loadStops() {
            const tbody = document.getElementById("stopsTbody");
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Loading...</td></tr>';
            try {
                currentStops = await api.get(`/admin/routes/${activeRouteId}/stops`);
                if (!currentStops.length) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No stops defined for this route.</td></tr>';
                    return;
                }
                tbody.innerHTML = currentStops.map((s, idx) => `
                    <tr>
                        <td class="text-center fw-bold">${s.stop_order}</td>
                        <td>${esc(s.stop_name)}</td>
                        <td class="text-center"><button class="btn btn-sm btn-outline-danger py-0" onclick="deleteStop(${s.stop_id})">✕</button></td>
                    </tr>
                `).join("");
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Failed to load stops.</td></tr>';
            }
        }

        async function addStop() {
            const nameInput = document.getElementById("newStopName");
            const name = nameInput.value.trim();
            if (!name) return showToast("Stop name is required", "error");

            // Determine next order number
            const nextOrder = currentStops.length > 0
                ? Math.max(...currentStops.map(s => s.stop_order)) + 1
                : 1;

            try {
                await api.post(`/admin/routes/${activeRouteId}/stops`, {
                    stop_name: name,
                    stop_order: nextOrder
                });
                nameInput.value = "";
                showToast("Stop added!", "success");
                await loadStops();
                // Refresh main routes table in background to update stop counts
                loadRoutes();
            } catch (err) {
                showToast("Failed to add stop", "error");
            }
        }

        async function deleteStop(stopId) {
            if (!confirm("Remove this stop?")) return;
            try {
                await api.delete(`/admin/routes/${activeRouteId}/stops/${stopId}`);
                showToast("Stop removed", "success");
                await loadStops();
                loadRoutes();
            } catch (err) {
                showToast("Failed to delete stop", "error");
            }
        }

        loadRoutes();
    </script>
</body>

</html>
