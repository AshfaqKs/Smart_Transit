<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complaints — SmartTransit Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="routes.html" class="menu-item"><span class="icon">🗺️</span> Routes</a>
            <a href="drivers.html" class="menu-item"><span class="icon">🚌</span> Drivers</a>
            <a href="buses.html" class="menu-item"><span class="icon">🚍</span> Buses</a>
            <a href="complaints.html" class="menu-item active"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
            <a href="users.html" class="menu-item"><span class="icon">👥</span> Users</a>
            <a href="police.html" class="menu-item"><span class="icon">👮</span> Police</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Complaint Management</h2>
            <div class="st-card">
                <div id="compList">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Reply Modal -->
    <div class="modal fade" id="replyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reply to Complaint</h5><button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body st-form">
                    <input type="hidden" id="replyCompId" />
                    <div class="mb-3"><label>Status</label>
                        <select class="form-select" id="replyStatus">
                            <option value="pending">Pending</option>
                            <option value="resolved">Resolved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>Assign Police Station</label>
                        <select class="form-select" id="replyPolice">
                            <option value="">-- None (Unassigned) --</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>Reply Message</label><textarea class="form-control" id="replyMsg"
                            rows="3"></textarea></div>
                </div>
                <div class="modal-footer"><button class="btn-st" onclick="sendReply()">Send Reply</button></div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("admin");
        let complaints = [];
        let policeStations = [];
        async function load() {
            const [comps, stations] = await Promise.all([
                api.get("/admin/complaints"),
                api.get("/admin/police")
            ]);
            complaints = comps;
            policeStations = stations;

            const policeSelect = document.getElementById("replyPolice");
            policeSelect.innerHTML = '<option value="">-- None (Unassigned) --</option>' +
                policeStations.map(p => `<option value="${p.police_id}">${esc(p.station_name)}</option>`).join("");

            const el = document.getElementById("compList");
            if (!complaints.length) { el.innerHTML = '<p class="text-muted">No complaints yet.</p>'; return; }
            el.innerHTML = `<table class="st-table"><thead><tr><th>#</th><th>Passenger</th><th>Reg. No.</th><th>Type</th><th>Description</th><th>Date/Time</th><th>Status</th><th>Station</th><th>Actions</th></tr></thead>
      <tbody>${complaints.map((c, i) => `<tr>
        <td>${i + 1}</td>
        <td class="fw-semibold">${esc(c.passenger_name || 'Unknown')}</td>
        <td class="font-monospace">${esc(c.bus_registration) || '—'}</td>
        <td>${esc(c.complaint_type)}</td>
        <td>${esc(c.description?.substring(0, 50))}…</td>
        <td class="text-muted small">${(c.created_at || '').substring(0, 16).replace('T', ' ')}</td>
        <td>${badge(c.status)}</td>
        <td>${c.police_id ? esc(policeStations.find(p => p.police_id == c.police_id)?.station_name || "Assigned") : "<span class='text-muted'>Unassigned</span>"}</td>
        <td><button class="btn btn-sm btn-primary" onclick="openReply(${c.complaint_id})">Reply / Assign</button></td>
      </tr>`).join("")}
      </tbody></table>`;
        }

        function openReply(id) {
            const c = complaints.find(x => x.complaint_id === id);
            document.getElementById("replyCompId").value = id;
            document.getElementById("replyStatus").value = c.status;
            document.getElementById("replyPolice").value = c.police_id || "";
            document.getElementById("replyMsg").value = c.reply || "";
            new bootstrap.Modal(document.getElementById("replyModal")).show();
        }

        async function sendReply() {
            const id = document.getElementById("replyCompId").value;
            await api.put(`/admin/complaints/${id}/reply`, {
                status: document.getElementById("replyStatus").value,
                reply: document.getElementById("replyMsg").value,
                police_id: document.getElementById("replyPolice").value || null
            });
            bootstrap.Modal.getInstance(document.getElementById("replyModal")).hide();
            showToast("Reply & Assignment saved!", "success");
            load();
        }

        load();
    </script>
</body>

</html>
