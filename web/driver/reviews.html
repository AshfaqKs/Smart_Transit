<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bus Reviews — SmartTransit Driver</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        .star-filled {
            color: #fbc02d;
            font-size: 1.2rem;
        }

        .star-empty {
            color: var(--text-muted);
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="route.html" class="menu-item"><span class="icon">🗺️</span> My Route</a>
            <a href="location.html" class="menu-item"><span class="icon">📍</span> Update Location</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Passenger Reviews</h2>

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="st-card text-center py-4">
                        <h6 class="text-muted fw-bold text-uppercase mb-2">Average Rating</h6>
                        <h1 class="fw-bold mb-0" id="avgRating">—</h1>
                        <div id="avgStars" class="mt-2 text-warning fs-4"></div>
                        <p class="text-muted small mt-2 mb-0" id="totalReviewsCount">0 reviews</p>
                    </div>
                </div>
            </div>

            <div class="st-card">
                <h5 class="fw-bold mb-4">Recent Feedback</h5>
                <div class="table-responsive">
                    <table class="st-table">
                        <thead>
                            <tr>
                                <th>Rating</th>
                                <th>Passenger</th>
                                <th>Comments</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="reviewsTbody">
                            <tr>
                                <td colspan="4" class="text-center text-muted">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("driver");

        function drawStars(rating) {
            let html = "";
            for (let i = 1; i <= 5; i++) {
                html += (i <= rating) ? '<span class="star-filled">★</span>' : '<span class="star-empty">★</span>';
            }
            return html;
        }

        async function load() {
            try {
                const reviews = await api.get("/driver/reviews");
                const tbody = document.getElementById("reviewsTbody");

                if (!reviews.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No reviews for your assigned bus yet.</td></tr>';
                    return;
                }

                // Calculate average rating
                const sum = reviews.reduce((acc, r) => acc + r.rating, 0);
                const avg = (sum / reviews.length).toFixed(1);

                document.getElementById("avgRating").textContent = avg;
                document.getElementById("totalReviewsCount").textContent = `${reviews.length} passenger(s) rated`;
                document.getElementById("avgStars").innerHTML = drawStars(Math.round(avg));

                tbody.innerHTML = reviews.map(r => `
                    <tr>
                        <td style="min-width: 100px;">${drawStars(r.rating)}</td>
                        <td class="fw-bold">${esc(r.user_name)}</td>
                        <td><div class="text-wrap" style="max-width:350px;">${esc(r.comments || "—")}</div></td>
                        <td class="text-muted small">${esc(r.created_at).substring(0, 10)}</td>
                    </tr>
                `).join("");

            } catch (err) {
                console.error(err);
                document.getElementById("reviewsTbody").innerHTML = '<tr><td colspan="4" class="text-danger text-center">Failed to load reviews.</td></tr>';
            }
        }

        load();
    </script>
</body>

</html>
