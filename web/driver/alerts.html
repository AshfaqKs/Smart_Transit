<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Alerts — SmartTransit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="route.html" class="menu-item"><span class="icon">🗺️</span> My Route</a>
            <a href="location.html" class="menu-item"><span class="icon">📍</span> Update Location</a>
            <a href="alerts.html" class="menu-item active"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-2">Active Alerts</h2>
            <p class="text-muted mb-4">AI camera alerts for criminals or missing persons detected on your bus.</p>
            <div id="alertList">
                <div class="text-muted">Loading…</div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("driver");
        async function load() {
            const alerts = await api.get("/driver/alerts");
            const el = document.getElementById("alertList");
            if (!alerts.length) { el.innerHTML = '<div class="st-card">No alerts on your bus. All clear! ✅</div>'; return; }
            el.innerHTML = alerts.map(a => `
      <div class="st-card mb-3" style="border-left:4px solid var(--danger);">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-bold text-danger fs-5">🚨 ${esc(a.detected_person_type === "criminal" ? "Criminal Detected!" : "Missing Person Detected!")}</div>
            <div class="text-muted mt-1">Reference ID: #${esc(a.reference_id)}</div>
            <div class="text-muted" style="font-size:.85rem;">📍 Location: ${esc(a.location || '—')}</div>
            <div class="text-muted" style="font-size:.85rem;">${esc(a.detection_time)}</div>
            <div class="mt-2 p-2 rounded" style="background:rgba(239,68,68,.1); color:#fca5a5; font-size:.85rem;">
              ⚠️ Please remain calm and notify authorities immediately. Do not confront the individual.
            </div>
          </div>
          ${badge(a.alert_status)}
        </div>
      </div>`).join("");
        }
        load();
        setInterval(load, 8000); // check every 8 seconds for new alerts
    </script>
</body>

</html>
