<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Location — SmartTransit Driver</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="route.html" class="menu-item"><span class="icon">🗺️</span> My Route</a>
            <a href="location.html" class="menu-item active"><span class="icon">📍</span> Update Location</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Location Broadcasting</h2>
            <div class="row">
                <div class="col-md-6">
                    <div class="st-card text-center py-5 border border-secondary shadow-sm">
                        <div id="statusBadge" class="mb-4">
                            <h3 class="fw-bold text-danger">🔴 Stopped</h3>
                            <p class="text-muted small">Location tracking is currently off.</p>
                        </div>
                        <div class="mb-5">
                            <p class="text-muted mb-1">Current Coordinates</p>
                            <h4 class="fw-bold text-light font-monospace" id="coordDisplay">—, —</h4>
                        </div>
                        <button class="btn btn-outline-success btn-lg px-5 py-3 fw-bold" id="toggleBtn"
                            onclick="toggleTracking()">
                            ▶ Start Broadcasting
                        </button>
                        <p class="text-muted small mt-3 px-3">
                            When active, your location will be sent to the SmartTransit server every 10 seconds.
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("driver");

        let watchId = null;
        let isTracking = false;
        let lastLat = null;
        let lastLng = null;
        let syncInterval = null;

        function updateScreenStatus() {
            const badge = document.getElementById("statusBadge");
            const btn = document.getElementById("toggleBtn");
            if (isTracking) {
                badge.innerHTML = `<h3 class="fw-bold text-success">🟢 Broadcasting Live</h3><p class="text-success small">Updating every 10 seconds.</p>`;
                btn.className = "btn btn-outline-danger btn-lg px-5 py-3 fw-bold";
                btn.innerHTML = "⏹ Stop Broadcasting";
            } else {
                badge.innerHTML = `<h3 class="fw-bold text-danger">🔴 Stopped</h3><p class="text-muted small">Location tracking is currently off.</p>`;
                btn.className = "btn btn-outline-success btn-lg px-5 py-3 fw-bold";
                btn.innerHTML = "▶ Start Broadcasting";
                document.getElementById("coordDisplay").textContent = "—, —";
            }
        }

        async function syncLocation() {
            if (lastLat && lastLng) {
                try {
                    await api.put("/driver/location", { location: `${lastLat.toFixed(6)},${lastLng.toFixed(6)}` });
                } catch (e) {
                    console.error("Failed to sync location");
                }
            }
        }

        function toggleTracking() {
            if (!("geolocation" in navigator)) {
                showToast("Geolocation is not supported by your browser.", "error");
                return;
            }

            if (isTracking) {
                // STOP
                if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                if (syncInterval) clearInterval(syncInterval);
                isTracking = false;
                watchId = null;
                syncInterval = null;
                updateScreenStatus();
                showToast("Location tracking stopped.");
            } else {
                // START
                try {
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            lastLat = pos.coords.latitude;
                            lastLng = pos.coords.longitude;
                            document.getElementById("coordDisplay").textContent = `${lastLat.toFixed(5)}, ${lastLng.toFixed(5)}`;
                        },
                        (err) => {
                            console.error(err);
                            showToast("Error getting location. Ensure permissions are granted.", "error");
                            if (isTracking) toggleTracking(); // Turn off visually
                        },
                        { enableHighAccuracy: true }
                    );

                    // Sync immediately and then every 10s
                    setTimeout(syncLocation, 1000);
                    syncInterval = setInterval(syncLocation, 10000);

                    isTracking = true;
                    updateScreenStatus();
                    showToast("Started location broadcasting.", "success");
                } catch (e) {
                    showToast("Geolocation permission denied.", "error");
                }
            }
        }
    </script>
</body>

</html>
