<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Dashboard — SmartTransit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item active"><span class="icon">📊</span> Dashboard</a>
            <a href="route.html" class="menu-item"><span class="icon">🗺️</span> My Route</a>
            <a href="location.html" class="menu-item"><span class="icon">📍</span> Update Location</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Driver Dashboard</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3">My Profile</h5>
                        <div id="profileInfo">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3">Assigned Route &amp; Bus</h5>
                        <div id="scheduleInfo">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3">Recent Complaints on My Bus</h5>
                        <div id="driverComplaints">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="st-card">
                        <h5 class="fw-bold mb-3 d-flex justify-content-between align-items-center">
                            Recent Security Alerts
                            <a href="alerts.html" class="btn-st-outline btn-sm" style="font-size:.75rem">View All</a>
                        </h5>
                        <div id="driverAlerts">
                            <div class="text-muted small">Loading…</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("driver");
        async function load() {
            const [profile, schedule, complaints, alerts] = await Promise.all([
                api.get("/driver/profile"), api.get("/driver/schedule"), 
                api.get("/driver/complaints"), api.get("/driver/alerts")
            ]);
            document.getElementById("profileInfo").innerHTML = `
      <dl class="row mb-0">
        <dt class="col-5 text-muted">Name</dt><dd class="col-7">${esc(profile.name)}</dd>
        <dt class="col-5 text-muted">Email</dt><dd class="col-7">${esc(profile.email)}</dd>
        <dt class="col-5 text-muted">Phone</dt><dd class="col-7">${esc(profile.phone_number) || "—"}</dd>
        <dt class="col-5 text-muted">License</dt><dd class="col-7">${esc(profile.license_number)}</dd>
        <dt class="col-5 text-muted">Status</dt><dd class="col-7">${badge(profile.approval_status ? "approved" : "pending")}</dd>
      </dl>`;

            if (schedule.bus) {
                document.getElementById("scheduleInfo").innerHTML = `
        <dl class="row mb-0">
          <dt class="col-5 text-muted">Bus #</dt><dd class="col-7">${esc(schedule.bus.bus_number)}</dd>
          <dt class="col-5 text-muted">Status</dt><dd class="col-7">${badge(schedule.bus.status)}</dd>
          <dt class="col-5 text-muted">Location</dt><dd class="col-7">📍 ${esc(schedule.bus.location_name || schedule.bus.current_location) || "Unknown"}</dd>
          ${schedule.route ? `<dt class="col-5 text-muted">Route</dt><dd class="col-7">${esc(schedule.route.route_name)}</dd>
          <dt class="col-5 text-muted">From</dt><dd class="col-7">${esc(schedule.route.start_point)}</dd>
          <dt class="col-5 text-muted">To</dt><dd class="col-7">${esc(schedule.route.end_point)}</dd>` : ""}
        </dl>`;
            } else {
                document.getElementById("scheduleInfo").innerHTML = '<p class="text-muted">No bus assigned yet.</p>';
            }

            const compEl = document.getElementById("driverComplaints");
            if (!complaints.length) { compEl.innerHTML = '<p class="text-muted">No complaints. All clear! ✅</p>'; }
            else compEl.innerHTML = complaints.slice(0, 5).map(c => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom border-secondary">
        <div>
            <div class="fw-bold">${esc(c.complaint_type)}</div>
            <small class="text-muted">By: ${esc(c.passenger_name || 'Passenger')}</small>
        </div>
        <div class="text-end">
            <small class="text-muted d-block">${c.created_at ? new Date(c.created_at).toLocaleString('en-IN', {hour:'2-digit', minute:'2-digit'}) : "—"}</small>
            ${badge(c.status)}
        </div>
      </div>`).join("");

            const alertEl = document.getElementById("driverAlerts");
            if (!alerts.length) { alertEl.innerHTML = '<p class="text-muted small">No security alerts. All clear! ✅</p>'; }
            else alertEl.innerHTML = alerts.slice(0, 5).map(a => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom border-secondary">
        <div>
            <div class="text-danger fw-bold small">🚨 ${esc((a.detected_person_type || '').toUpperCase().replace('_',' '))}</div>
            <div class="fw-semibold">${esc(a.person_name)}</div>
            <small class="text-muted">📍 ${esc(a.location || 'Unknown')}</small>
        </div>
        <div class="text-end">
            <small class="text-muted d-block">${a.detection_time ? new Date(a.detection_time).toLocaleString('en-IN', {hour:'2-digit', minute:'2-digit'}) : "—"}</small>
            ${badge(a.alert_status)}
        </div>
      </div>`).join("");
        }
        load();
    </script>
</body>

</html>
