<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Route & Schedule — SmartTransit Driver</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        .timeline {
            border-left: 2px solid #0d6efd;
            padding-left: 1rem;
            margin-left: 0.5rem;
            list-style-type: none;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1rem;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -1.45rem;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #0d6efd;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="route.html" class="menu-item active"><span class="icon">🗺️</span> My Route</a>
            <a href="location.html" class="menu-item"><span class="icon">📍</span> Update Location</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">My Assigned Route</h2>
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="st-card h-100">
                        <h5 class="fw-bold mb-4">Bus Details</h5>
                        <div id="busInfo">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="st-card h-100">
                        <h5 class="fw-bold mb-4">Route Info</h5>
                        <div id="routeInfo">
                            <div class="text-muted">Loading…</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="st-card mt-4">
                <h5 class="fw-bold mb-3">Schedule / Trip Timings</h5>
                <p class="text-muted small mb-4">You are expected to follow this general schedule. Timings are
                    estimated.</p>
                <div class="table-responsive">
                    <table class="st-table">
                        <thead>
                            <tr>
                                <th>Trip</th>
                                <th>Direction</th>
                                <th>Est. Departure</th>
                                <th>Est. Arrival</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleTable">
                            <tr>
                                <td colspan="4" class="text-center text-muted">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("driver");

        async function load() {
            try {
                const scheduleData = await api.get("/driver/schedule");

                if (!scheduleData.bus) {
                    document.getElementById("busInfo").innerHTML = '<p class="text-muted">No bus assigned to you yet. Please contact your administrator.</p>';
                    document.getElementById("routeInfo").innerHTML = '<p class="text-muted">—</p>';
                    document.getElementById("scheduleTable").innerHTML = '<tr><td colspan="4" class="text-center text-muted">No schedule available</td></tr>';
                    return;
                }

                // Bus Info
                document.getElementById("busInfo").innerHTML = `
                  <dl class="row mb-0">
                    <dt class="col-4 text-muted">Bus Number</dt>
                    <dd class="col-8 fw-bold fs-5">${esc(scheduleData.bus.bus_number)}</dd>
                    
                    <dt class="col-4 text-muted">Status</dt>
                    <dd class="col-8">${badge(scheduleData.bus.status)}</dd>
                    
                    <dt class="col-4 text-muted">Last Location</dt>
                    <dd class="col-8 font-monospace text-warning">📍 ${esc(scheduleData.bus.current_location) || "Not broadcasting"}</dd>
                  </dl>`;

                // Route Info
                if (scheduleData.route) {
                    let stopsHtml = '';
                    if (scheduleData.route.stops && scheduleData.route.stops.length > 0) {
                        stopsHtml = '<ul class="timeline mt-3 mb-0">';
                        scheduleData.route.stops.forEach(s => {
                            stopsHtml += `<li class="timeline-item"><span class="fw-semibold">Stop ${s.stop_order}:</span> ${esc(s.stop_name)}</li>`;
                        });
                        stopsHtml += '</ul>';
                    } else {
                        stopsHtml = '<p class="text-muted small mt-2 mb-0">No stops defined</p>';
                    }

                    document.getElementById("routeInfo").innerHTML = `
                      <dl class="row mb-0">
                        <dt class="col-4 text-muted">Route Name</dt>
                        <dd class="col-8 fw-bold">${esc(scheduleData.route.route_name)}</dd>
                        
                        <dt class="col-4 text-muted">Start Point</dt>
                        <dd class="col-8">${esc(scheduleData.route.start_point)}</dd>
                        
                        <dt class="col-4 text-muted">End Point</dt>
                        <dd class="col-8">${esc(scheduleData.route.end_point)}</dd>
                      </dl>
                      <hr>
                      <h6 class="fw-bold mb-3 text-primary">Route Waypoints</h6>
                      ${stopsHtml}`;

                    // Dummy static schedule for now (until we build a complex timetable module)
                    document.getElementById("scheduleTable").innerHTML = `
                        <tr>
                            <td>Morning Trip 1</td>
                            <td>${esc(scheduleData.route.start_point)} → ${esc(scheduleData.route.end_point)}</td>
                            <td>08:00 AM</td>
                            <td>09:30 AM</td>
                        </tr>
                        <tr>
                            <td>Morning Trip 2</td>
                            <td>${esc(scheduleData.route.end_point)} → ${esc(scheduleData.route.start_point)}</td>
                            <td>10:00 AM</td>
                            <td>11:30 AM</td>
                        </tr>
                        <tr>
                            <td>Afternoon Trip 1</td>
                            <td>${esc(scheduleData.route.start_point)} → ${esc(scheduleData.route.end_point)}</td>
                            <td>02:00 PM</td>
                            <td>03:30 PM</td>
                        </tr>
                        <tr>
                            <td>Evening Trip 1</td>
                            <td>${esc(scheduleData.route.end_point)} → ${esc(scheduleData.route.start_point)}</td>
                            <td>05:30 PM</td>
                            <td>07:00 PM</td>
                        </tr>
                    `;
                } else {
                    document.getElementById("routeInfo").innerHTML = '<p class="text-muted">Bus is not assigned to a specific route.</p>';
                    document.getElementById("scheduleTable").innerHTML = '<tr><td colspan="4" class="text-center text-muted">No route assigned</td></tr>';
                }

            } catch (err) {
                console.error(err);
                document.getElementById("busInfo").innerHTML = '<p class="text-danger">Error loading data.</p>';
            }
        }

        load();
    </script>
</body>

</html>
