<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Route — SmartTransit Driver</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        .timeline {
            border-left: 2px solid #4f46e5;
            padding-left: 1rem;
            margin-left: 0.5rem;
            list-style-type: none;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1rem;
        }
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -1.45rem;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #4f46e5;
            border-radius: 50%;
        }
        .trip-section-tabs .nav-link { color: var(--text-muted); font-weight: 600; }
        .trip-section-tabs .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    </style>
</head>

    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="route.html" class="menu-item active"><span class="icon">🗺️</span> My Route</a>
            <a href="location.html" class="menu-item"><span class="icon">📍</span> Update Location</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">My Route</h2>

            <!-- Current Trip card -->
            <div class="st-card mb-4">
                <h5 class="fw-bold mb-3">🚦 Current Trip</h5>
                <div id="currentTrip"><div class="text-muted">Loading…</div></div>
            </div>

            <!-- Bus & Route Info -->
            <div class="row g-4 mb-4">
                <div class="col-lg-6">
                    <div class="st-card h-100">
                        <h5 class="fw-bold mb-3">🚌 Bus Details</h5>
                        <div id="busInfo"><div class="text-muted">Loading…</div></div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="st-card h-100">
                        <h5 class="fw-bold mb-3">🗺️ Route Info</h5>
                        <div id="routeInfo"><div class="text-muted">Loading…</div></div>
                    </div>
                </div>
            </div>

            <!-- Trip History & Future Trips tabs (Hidden as requested) -->

            <div class="st-card">
                <ul class="nav trip-section-tabs mb-4 border-bottom border-secondary">
                    <li class="nav-item">

                    </li>
                    <li class="nav-item">

                    </li>
                </ul>

                <div id="tabHist">
                    <p class="text-muted small mb-3">Past completed trips on this route (today's schedule used as reference).</p>
                    <div class="table-scroll">

                            <tbody id="historyTable"><tr><td colspan="5" class="text-center text-muted">Loading…</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <div id="tabFut" style="display:none;">

                            <tbody id="futureTable"><tr><td colspan="5" class="text-center text-muted">Loading…</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
            -->
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("driver");

        function showTripTab(tab) {
            document.getElementById("tabHist").style.display = tab === "hist" ? "" : "none";
            document.getElementById("tabFut").style.display  = tab === "fut"  ? "" : "none";
            document.getElementById("tabHistBtn").classList.toggle("active", tab === "hist");
            document.getElementById("tabFutBtn").classList.toggle("active", tab === "fut");
        }

        async function load() {
            try {
                const sd = await api.get("/driver/schedule");

                if (!sd.bus) {
                    document.getElementById("currentTrip").innerHTML = '<p class="text-muted">No bus assigned yet. Contact your administrator.</p>';
                    document.getElementById("busInfo").innerHTML = '<p class="text-muted">No bus assigned.</p>';
                    document.getElementById("routeInfo").innerHTML = '<p class="text-muted">—</p>';
                    const hTable = document.getElementById("historyTable");
                    const fTable = document.getElementById("futureTable");
                    if(hTable) hTable.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No data</td></tr>';
                    if(fTable) fTable.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No data</td></tr>';
                    return;
                }

                // ── Current Trip ──────────────────────────────────────────────
                const routeName = sd.route ? esc(sd.route.route_name) : "—";
                const start     = sd.route ? esc(sd.route.start_point) : "—";
                const end_pt    = sd.route ? esc(sd.route.end_point)   : "—";
                const busLoc    = esc(sd.bus.location_name || sd.bus.current_location) || "Unknown";

                document.getElementById("currentTrip").innerHTML = `
                  <div class="row g-3">
                    <div class="col-md-4">
                      <div class="text-muted small mb-1">Route</div>
                      <div class="fw-bold fs-5">${routeName}</div>
                    </div>
                    <div class="col-md-4">
                      <div class="text-muted small mb-1">Start → End</div>
                      <div class="fw-semibold">${start} → ${end_pt}</div>
                    </div>
                    <div class="col-md-4">
                      <div class="text-muted small mb-1">Current Bus Location</div>
                      <div class="font-monospace text-warning">📍 ${busLoc}</div>
                    </div>
                  </div>`;

                // ── Bus Info ──────────────────────────────────────────────────
                document.getElementById("busInfo").innerHTML = `
                  <dl class="row mb-0">
                    <dt class="col-5 text-muted">Reg. No.</dt>
                    <dd class="col-7 fw-bold fs-5">${esc(sd.bus.bus_number)}</dd>
                    <dt class="col-5 text-muted">Status</dt>
                    <dd class="col-7">${badge(sd.bus.status)}</dd>
                    <dt class="col-5 text-muted">Location</dt>
                    <dd class="col-7 font-monospace text-warning">📍 ${busLoc}</dd>
                  </dl>`;

                // ── Route Info ────────────────────────────────────────────────
                if (sd.route) {
                    let stopsHtml = "";
                    if (sd.route.stops && sd.route.stops.length > 0) {
                        stopsHtml = '<ul class="timeline mt-3 mb-0">';
                        sd.route.stops.forEach(s => {
                            stopsHtml += `<li class="timeline-item"><span class="fw-semibold">Stop ${s.stop_order}:</span> ${esc(s.stop_name)}</li>`;
                        });
                        stopsHtml += "</ul>";
                    } else {
                        stopsHtml = '<p class="text-muted small mt-2 mb-0">No stops defined</p>';
                    }
                    document.getElementById("routeInfo").innerHTML = `
                      <dl class="row mb-0">
                        <dt class="col-4 text-muted">Name</dt><dd class="col-8 fw-bold">${esc(sd.route.route_name)}</dd>
                        <dt class="col-4 text-muted">From</dt><dd class="col-8">${esc(sd.route.start_point)}</dd>
                        <dt class="col-4 text-muted">To</dt><dd class="col-8">${esc(sd.route.end_point)}</dd>
                      </dl>
                      <hr>
                      <h6 class="fw-bold mb-2">Waypoints</h6>
                      ${stopsHtml}`;
                } else {
                    document.getElementById("routeInfo").innerHTML = '<p class="text-muted">Bus not assigned to a route.</p>';
                }

                // ── Static schedule rows (history = morning trips, future = afternoon+evening) ────
                const dir1 = `${esc(sd.route?.start_point || "Start")} → ${esc(sd.route?.end_point || "End")}`;
                const dir2 = `${esc(sd.route?.end_point || "End")} → ${esc(sd.route?.start_point || "Start")}`;

                // ── Trip tables (History/Future) are commented out in HTML
                const hTable = document.getElementById("historyTable");
                const fTable = document.getElementById("futureTable");

                if (hTable) {
                    hTable.innerHTML = `
                        <tr><td>1</td><td>${dir1}</td><td>06:00 AM</td><td>07:30 AM</td><td>${badge("resolved")}</td></tr>
                        <tr><td>2</td><td>${dir2}</td><td>08:00 AM</td><td>09:30 AM</td><td>${badge("resolved")}</td></tr>`;
                }

                if (fTable) {
                    fTable.innerHTML = `
                        <tr><td>1</td><td>${dir1}</td><td>02:00 PM</td><td>03:30 PM</td><td>${badge("pending")}</td></tr>
                        <tr><td>2</td><td>${dir2}</td><td>05:00 PM</td><td>06:30 PM</td><td>${badge("pending")}</td></tr>
                        <tr><td>3</td><td>${dir1}</td><td>07:00 PM</td><td>08:30 PM</td><td>${badge("pending")}</td></tr>`;
                }

            } catch (err) {
                console.error(err);
                document.getElementById("currentTrip").innerHTML = '<p class="text-danger">Error loading data.</p>';
            }
        }

        load();
    </script>
</body>
</html>
