<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerts — SmartTransit Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item active"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Camera Detection Alerts</h2>
            <div class="st-card p-0">
                <div class="table-scroll">
                    <table class="st-table">
                        <thead><tr>
                            <th>#</th><th>Type</th><th>Person Name</th><th>Reg. No.</th>
                            <th>Bus Location</th><th>Detection Time</th><th>Status</th><th>Action</th>
                        </tr></thead>
                        <tbody id="alertBody">
                            <tr><td colspan="8" class="text-center text-muted py-3">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");

        function fmtDate(iso) {
            if (!iso) return "—";
            try { return new Date(iso).toLocaleString('en-IN'); } catch { return iso; }
        }

        async function load() {
            const tbody = document.getElementById("alertBody");
            try {
                const alerts = await api.get("/police/alerts");
                if (!alerts.length) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No alerts.</td></tr>';
                    return;
                }
                tbody.innerHTML = alerts.map((a, i) => `<tr>
                    <td><small class="text-muted">${i + 1}</small></td>
                    <td><span class="fw-semibold" style="color:var(--danger)">${esc(a.detected_person_type)}</span></td>
                    <td class="fw-semibold">${esc(a.person_name) || '<span class="text-muted">—</span>'}</td>
                    <td><span class="font-monospace">${esc(a.bus_registration) || esc(a.bus_id) || "—"}</span></td>
                    <td><small>${esc(a.location) || "—"}</small></td>
                    <td><small>${fmtDate(a.detection_time)}</small></td>
                    <td>${badge(a.alert_status)}</td>
                    <td>${a.alert_status === "unresolved"
                        ? `<button class="btn btn-sm btn-outline-success" onclick="resolveAlert(${a.detection_id})">Resolve</button>`
                        : '<span class="text-muted">✓ Handled</span>'}
                    </td>
                </tr>`).join("");
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger py-3">Failed to load.</td></tr>';
            }
        }

        async function resolveAlert(id) {
            try {
                await api.put(`/police/alerts/${id}/resolve`);
                showToast("Alert marked as resolved!", "success");
                load();
            } catch (err) {
                showToast("Failed to resolve alert.", "error");
            }
        }

        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
