<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerts — SmartTransit Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item active"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Camera Detection Alerts</h2>
            <div class="st-card">
                <div id="alertTable">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");
        async function load() {
            const alerts = await api.get("/police/alerts");
            const el = document.getElementById("alertTable");
            if (!alerts.length) { el.innerHTML = '<p class="text-muted">No alerts.</p>'; return; }
            el.innerHTML = `<table class="st-table"><thead><tr><th>ID</th><th>Type</th><th>Reference</th><th>Bus</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${alerts.map(a => `<tr>
        <td>${esc(a.detection_id)}</td>
        <td><span class="fw-semibold" style="color:var(--danger)">${esc(a.detected_person_type)}</span></td>
        <td>#${esc(a.reference_id)}</td>
        <td>${esc(a.bus_id) || "N/A"}</td>
        <td>${esc(a.detection_time)}</td>
        <td>${badge(a.alert_status)}</td>
        <td>
           ${a.alert_status === "unresolved"
                    ? `<button class="btn btn-sm btn-outline-success" onclick="resolveAlert(${a.detection_id})">Resolve</button>`
                    : `<span class="text-muted">✓ Handled</span>`}
        </td>
      </tr>`).join("")}</tbody></table>`;
        }

        async function resolveAlert(id) {
            try {
                await api.put(`/police/alerts/${id}/resolve`);
                showToast("Alert marked as resolved!", "success");
                load();
            } catch (err) {
                console.error("Failed to resolve alert.");
            }
        }

        load();
        setInterval(load, 10000);
    </script>
</body>

</html>
