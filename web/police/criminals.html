<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criminals — SmartTransit Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item active"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold mb-0">Criminal Records</h2>
                <button class="btn-st" onclick="openAdd()">+ Add Criminal</button>
            </div>

            <!-- Search & Filter -->
            <div class="st-card mb-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchName" placeholder="🔍 Search by name…"
                               oninput="applyFilter()" />
                    </div>
                    <div class="col-md-4">
                        <select class="form-select" id="filterType" onchange="applyFilter()">
                            <option value="">All Crime Types</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn-st-outline w-100" onclick="clearFilter()">Clear</button>
                    </div>
                </div>
            </div>

            <div class="row g-3" id="criminalsGrid">
                <div class="col-12 text-muted">Loading…</div>
            </div>
        </main>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Criminal Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body st-form">
                    <div class="mb-3"><label>Name *</label><input type="text" class="form-control" id="cName" /></div>
                    <div class="mb-3"><label>Crime Type</label><input type="text" class="form-control" id="cType" /></div>
                    <div class="mb-3"><label>Description</label><textarea class="form-control" id="cDesc" rows="2"></textarea></div>
                    <div class="mb-3"><label>Photo</label><input type="file" class="form-control" id="cPhoto" accept="image/*" /></div>
                </div>
                <div class="modal-footer"><button class="btn-st" onclick="saveCriminal()">Save</button></div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");
        let allItems = [];

        async function load() {
            allItems = await api.get("/police/criminals");
            // Populate crime type filter
            const types = [...new Set(allItems.map(c => c.crime_type).filter(Boolean))];
            const sel = document.getElementById("filterType");
            sel.innerHTML = '<option value="">All Crime Types</option>' +
                types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
            applyFilter();
        }

        function applyFilter() {
            const q = document.getElementById("searchName").value.toLowerCase().trim();
            const typeVal = document.getElementById("filterType").value.toLowerCase();
            const filtered = allItems.filter(c =>
                (!q || c.name?.toLowerCase().includes(q)) &&
                (!typeVal || c.crime_type?.toLowerCase() === typeVal)
            );
            renderGrid(filtered);
        }

        function clearFilter() {
            document.getElementById("searchName").value = "";
            document.getElementById("filterType").value = "";
            applyFilter();
        }

        function renderGrid(items) {
            const el = document.getElementById("criminalsGrid");
            if (!items.length) {
                el.innerHTML = '<div class="col-12"><p class="text-muted">No records found.</p></div>';
                return;
            }
            el.innerHTML = items.map(c => `
              <div class="col-md-4">
                <div class="st-card h-100">
                  ${c.photo ? `<img src="/uploads/${esc(c.photo)}" class="rounded mb-2" style="width:100%;height:140px;object-fit:cover;" alt="photo" />` : ""}
                  <div class="fw-bold fs-5 mb-1">${esc(c.name)}</div>
                  <div class="text-light mb-2" style="font-size:.85rem;opacity:0.9;">${esc(c.crime_type) || "—"}</div>
                  <p class="text-light" style="font-size:.85rem;opacity:0.9;">${esc(c.description?.substring(0, 100)) || ""}</p>
                  <button class="btn btn-sm btn-danger" onclick="delCriminal(${c.criminal_id})">🗑 Delete</button>
                </div>
              </div>`).join("");
        }

        function openAdd() { new bootstrap.Modal(document.getElementById("addModal")).show(); }

        async function saveCriminal() {
            const fd = new FormData();
            fd.append("name", document.getElementById("cName").value);
            fd.append("crime_type", document.getElementById("cType").value);
            fd.append("description", document.getElementById("cDesc").value);
            const photo = document.getElementById("cPhoto").files[0];
            if (photo) fd.append("photo", photo);
            await api.upload("/police/criminals", fd);
            bootstrap.Modal.getInstance(document.getElementById("addModal")).hide();
            showToast("Criminal record added", "success");
            load();
        }

        async function delCriminal(id) {
            if (!confirm("Delete this criminal record?")) return;
            await api.delete(`/police/criminals/${id}`);
            showToast("Deleted", "success");
            load();
        }

        load();
    </script>
</body>
</html>
