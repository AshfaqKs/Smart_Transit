<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complaints — SmartTransit Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item active"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Complaints Assigned to Station</h2>
            <div class="st-card">
                <div id="compList">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal fade" id="actionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Take Action</h5><button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body st-form">
                    <input type="hidden" id="actionId" />
                    <div class="mb-3"><label>Status</label>
                        <select class="form-select" id="actionStatus">
                            <option value="pending">Pending</option>
                            <option value="resolved">Resolved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>Reply</label><textarea class="form-control" id="actionReply"
                            rows="3"></textarea></div>
                </div>
                <div class="modal-footer"><button class="btn-st" onclick="sendAction()">Submit</button></div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");
        let complaints = [];
        async function load() {
            complaints = await api.get("/police/complaints");
            const el = document.getElementById("compList");
            if (!complaints.length) { el.innerHTML = '<p class="text-muted">No complaints.</p>'; return; }
            el.innerHTML = `<table class="st-table"><thead><tr><th>#</th><th>Passenger</th><th>Bus</th><th>Type</th><th>Time</th><th>Location</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${complaints.map(c => `<tr>
        <td>${esc(c.complaint_id)}</td>
        <td>${esc(c.user_name || "Unknown")}</td>
        <td>${esc(c.bus_number)}<br><small class='text-muted'>${esc(c.bus_registration)}</small></td>
        <td>${esc(c.complaint_type)}</td>
        <td>${new Date(c.created_at).toLocaleString()}</td>
        <td>📍 ${esc(c.location_name || "Unknown")}</td>
        <td>${badge(c.status)}</td>
        <td><button class="btn btn-sm btn-primary" onclick="openAction(${c.complaint_id})">Action</button></td>
      </tr>`).join("")}</tbody></table>`;
        }
        function openAction(id) {
            const c = complaints.find(x => x.complaint_id === id);
            document.getElementById("actionId").value = id;
            document.getElementById("actionStatus").value = c.status;
            document.getElementById("actionReply").value = c.reply || "";
            new bootstrap.Modal(document.getElementById("actionModal")).show();
        }
        async function sendAction() {
            const id = document.getElementById("actionId").value;
            await api.put(`/police/complaints/${id}/action`, {
                status: document.getElementById("actionStatus").value,
                reply: document.getElementById("actionReply").value,
            });
            bootstrap.Modal.getInstance(document.getElementById("actionModal")).hide();
            showToast("Action recorded", "success"); load();
        }
        load();
    </script>
</body>

</html>
