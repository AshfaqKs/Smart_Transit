<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bus Feedback Monitoring — SmartTransit Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        .star-filled {
            color: #fbc02d;
            font-size: 1.1rem;
        }

        .star-empty {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">👮 SmartTransit Police</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Public Sentiment Monitoring</h2>
            <p class="text-muted mb-4">View public reviews of buses to identify potential safety issues or trends.</p>

            <div class="st-card">
                <div class="table-responsive">
                    <table class="st-table">
                        <thead>
                            <tr>
                                <th>Bus No.</th>
                                <th>Rating</th>
                                <th>Comments</th>
                                <th>Passenger</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="reviewsTbody">
                            <tr>
                                <td colspan="5" class="text-center text-muted">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");

        function drawStars(rating) {
            let html = "";
            for (let i = 1; i <= 5; i++) {
                html += (i <= rating) ? '<span class="star-filled">★</span>' : '<span class="star-empty">★</span>';
            }
            return html;
        }

        async function load() {
            try {
                const reviews = await api.get("/police/reviews");
                const tbody = document.getElementById("reviewsTbody");

                if (!reviews.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No public reviews available yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = reviews.map(r => `
                    <tr>
                        <td class="fw-bold">🚌 ${esc(r.bus_number)}</td>
                        <td style="min-width: 90px;">${drawStars(r.rating)}</td>
                        <td><div class="text-wrap text-muted small" style="max-width:350px;">${esc(r.comments || "—")}</div></td>
                        <td class="fw-bold opacity-75">${esc(r.user_name)}</td>
                        <td class="text-muted small">${esc(r.created_at).substring(0, 10)}</td>
                    </tr>
                `).join("");

            } catch (err) {
                console.error(err);
                document.getElementById("reviewsTbody").innerHTML = '<tr><td colspan="5" class="text-danger text-center">Failed to load reviews.</td></tr>';
            }
        }

        load();
    </script>
</body>

</html>
