<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Missing Persons — SmartTransit Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
        <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item active"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold mb-0">Missing Persons</h2>
                <button class="btn-st" onclick="openAdd()">+ Add Record</button>
            </div>

            <!-- Search & Filter -->
            <div class="st-card mb-4">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" class="form-control" id="searchName" placeholder="🔍 Search by name…"
                               oninput="applyFilter()" />
                    </div>
                    <div class="col-md-3">
                        <input type="number" class="form-control" id="filterAgeMin" placeholder="Min age"
                               oninput="applyFilter()" min="0" />
                    </div>
                    <div class="col-md-3">
                        <input type="number" class="form-control" id="filterAgeMax" placeholder="Max age"
                               oninput="applyFilter()" min="0" />
                    </div>
                    <div class="col-md-1">
                        <button class="btn-st-outline w-100" onclick="clearFilter()">✕</button>
                    </div>
                </div>
            </div>

            <div class="row g-3" id="missingGrid">
                <div class="col-12 text-muted">Loading…</div>
            </div>
        </main>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Missing Person</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body st-form">
                    <div class="mb-3"><label>Name *</label><input type="text" class="form-control" id="mName" /></div>
                    <div class="mb-3"><label>Age</label><input type="number" class="form-control" id="mAge" /></div>
                    <div class="mb-3"><label>Description</label><textarea class="form-control" id="mDesc" rows="2"></textarea></div>
                    <div class="mb-3"><label>Photo</label><input type="file" class="form-control" id="mPhoto" accept="image/*" /></div>
                </div>
                <div class="modal-footer"><button class="btn-st" onclick="saveMissing()">Save</button></div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");
        let allItems = [];

        async function load() {
            allItems = await api.get("/police/missing");
            applyFilter();
        }

        function applyFilter() {
            const q = document.getElementById("searchName").value.toLowerCase().trim();
            const minAge = parseInt(document.getElementById("filterAgeMin").value) || 0;
            const maxAge = parseInt(document.getElementById("filterAgeMax").value) || 999;
            const filtered = allItems.filter(m => {
                const age = m.age ? parseInt(m.age) : null;
                const nameMatch = !q || m.name?.toLowerCase().includes(q);
                const ageMatch = !m.age || (age >= minAge && age <= maxAge);
                return nameMatch && ageMatch;
            });
            renderGrid(filtered);
        }

        function clearFilter() {
            document.getElementById("searchName").value = "";
            document.getElementById("filterAgeMin").value = "";
            document.getElementById("filterAgeMax").value = "";
            applyFilter();
        }

        function renderGrid(items) {
            const el = document.getElementById("missingGrid");
            if (!items.length) {
                el.innerHTML = '<div class="col-12"><p class="text-muted">No records found.</p></div>';
                return;
            }
            el.innerHTML = items.map(m => `
              <div class="col-md-4">
                <div class="st-card h-100">
                  ${m.photo ? `<img src="/uploads/${esc(m.photo)}" class="rounded mb-2" style="width:100%;height:140px;object-fit:cover;" alt="photo" />` : ""}
                  <div class="fw-bold fs-5 mb-1">${esc(m.name)}</div>
                  <div class="text-light mb-2" style="font-size:.85rem;opacity:0.9;">Age: ${esc(m.age) || "Unknown"}</div>
                  <p class="text-light" style="font-size:.85rem;opacity:0.9;">${esc(m.description?.substring(0, 100)) || ""}</p>
                  <button class="btn btn-sm btn-danger" onclick="del(${m.missing_id})">🗑 Delete</button>
                </div>
              </div>`).join("");
        }

        function openAdd() { new bootstrap.Modal(document.getElementById("addModal")).show(); }

        async function saveMissing() {
            const fd = new FormData();
            fd.append("name", document.getElementById("mName").value);
            fd.append("age", document.getElementById("mAge").value);
            fd.append("description", document.getElementById("mDesc").value);
            const photo = document.getElementById("mPhoto").files[0];
            if (photo) fd.append("photo", photo);
            await api.upload("/police/missing", fd);
            bootstrap.Modal.getInstance(document.getElementById("addModal")).hide();
            showToast("Record added", "success");
            load();
        }

        async function del(id) {
            if (!confirm("Delete?")) return;
            await api.delete(`/police/missing/${id}`);
            showToast("Deleted", "success");
            load();
        }

        load();
    </script>
</body>
</html>
