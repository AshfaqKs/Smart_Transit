<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Police Dashboard — SmartTransit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
    <nav class="st-navbar d-flex align-items-center justify-content-between px-4">
        <span class="brand">🚌 SmartTransit</span>
        <button class="btn-st-outline btn-sm" onclick="logout()">Logout</button>
    </nav>
    <div class="st-layout">
                <aside class="st-sidebar">
            <a href="dashboard.html" class="menu-item active"><span class="icon">📊</span> Dashboard</a>
            <a href="criminals.html" class="menu-item"><span class="icon">🔒</span> Criminals</a>
            <a href="missing.html" class="menu-item"><span class="icon">🔍</span> Missing Persons</a>
            <a href="complaints.html" class="menu-item"><span class="icon">📋</span> Complaints</a>
            <a href="alerts.html" class="menu-item"><span class="icon">🔔</span> Alerts</a>
        </aside>
        <main class="st-content">
            <h2 class="fw-bold mb-4">Police Dashboard</h2>
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon">🔒</div>
                        <div class="stat-value" id="statCriminals">—</div>
                        <div class="stat-label">Criminals on Record</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon">🔍</div>
                        <div class="stat-value" id="statMissing">—</div>
                        <div class="stat-label">Missing Persons</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon">🔔</div>
                        <div class="stat-value" id="statAlerts">—</div>
                        <div class="stat-label">Camera Alerts</div>
                    </div>
                </div>
            </div>
            <div class="st-card">
                <h5 class="fw-bold mb-3">Recent Camera Alerts</h5>
                <div id="recentAlerts">
                    <div class="text-muted">Loading…</div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        requireAuth("police");
        async function load() {
            const [criminals, missing, alerts] = await Promise.all([
                api.get("/police/criminals"), api.get("/police/missing"), api.get("/police/alerts"),
            ]);
            document.getElementById("statCriminals").textContent = criminals.length;
            document.getElementById("statMissing").textContent = missing.length;
            document.getElementById("statAlerts").textContent = alerts.length;

            const el = document.getElementById("recentAlerts");
            if (!alerts.length) { el.innerHTML = '<p class="text-muted">No alerts yet.</p>'; return; }
            el.innerHTML = alerts.slice(0, 5).map(a => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom border-secondary">
        <div>
          <span class="fw-semibold">${esc(a.detected_person_type)}</span>
          · Ref #${esc(a.reference_id)} · Bus #${esc(a.bus_id) || "N/A"}
          <br><small class="text-muted">${esc(a.detection_time)}</small>
        </div>
        ${badge(a.alert_status)}
      </div>`).join("");
        }
        load();
    </script>
</body>

</html>
